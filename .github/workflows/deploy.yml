name: Deploy branch to Cloud Run
on:
  push:
    branches:
      - 'main'
    paths-ignore: # do not build for irrelvant changes like markdown files
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      meta: ${{ steps.meta.outputs.json }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth Cloud SDK
      id: 'auth'
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        token_format: 'access_token'

    - name: Login to pkg.dev
      uses: docker/login-action@v3
      with:
        registry: southamerica-east1-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: southamerica-east1-docker.pkg.dev/redflare-prod/cloud-run-source-deploy/redflare

    - name: Build and push
      id: build-push
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            SOURCE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.source'] }}
  
  cloud-run-deploy:
    runs-on: ubuntu-latest
    environment: 
      name: staging
      url: https://avatars-console-staging.xaeky.cloud
    permissions:
      contents: 'read'
      id-token: 'write'
    needs:
      - build
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - id: 'deploy'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.SERVICE_NAME }}
          image: southamerica-east1-docker.pkg.dev/redflare-prod/cloud-run-source-deploy/redflare@${{ needs.build.outputs.digest }}
          env_vars: |

          secrets: |
            DB_URL=${{ vars.DB_URL }}
          region: southamerica-east1
          flags: >
            --service-account=${{ vars.SERVICE_ACCOUNT }}
            --platform=managed
            --cpu=1
            --cpu-throttling
            --memory=1024Mi
            --max-instances=1
            --allow-unauthenticated
      
      - name: Send all traffic to this new version
        run: gcloud run services update-traffic ${{ vars.SERVICE_NAME }} --to-latest --region=southamerica-east1 --quiet