name: Deploy main branch to Cloud Run as staging
on:
  push:
    branches:
      - 'main'
    paths-ignore: # do not build for irrelvant changes like markdown files
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      meta: ${{ steps.meta.outputs.json }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth Cloud SDK
      id: 'auth'
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        token_format: 'access_token'

    - name: Login to pkg.dev
      uses: docker/login-action@v3
      with:
        registry: us-west1-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: us-west1-docker.pkg.dev/redflare-prod/avatars-console/redflare

    - name: Build and push
      id: build-push
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            SOURCE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.source'] }}
  
  deploy-canary:
    uses: ./.github/workflows/cloudrun-deploy.yml
    needs: build
    with:
      image: us-west1-docker.pkg.dev/redflare-prod/avatars-console/redflare@${{ needs.build.outputs.digest }}
      env: canary
    secrets: inherit

  test-e2e:
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: 'read'
    needs:
      - build
      - deploy-canary
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: true
          TEST_URL: ${{ needs.deploy-canary.outputs.url }}
          TEST_AGENT_OAUTH_USER: ${{ secrets.TEST_AGENT_OAUTH_USER }}
          TEST_AGENT_OAUTH_PASS: ${{ secrets.TEST_AGENT_OAUTH_PASS }}
        run: bun test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  deploy-staging:
    uses: ./.github/workflows/cloudrun-deploy.yml
    needs: [build, test-e2e]
    with:
      image: us-west1-docker.pkg.dev/redflare-prod/avatars-console/redflare@${{ needs.build.outputs.digest }}
      env: staging
    secrets: inherit

  promote-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://avatars-console-staging.xaeky.cloud
    permissions:
      contents: read
      id-token: write
    needs: deploy-staging
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Send all traffic to this new version
        run: gcloud run services update-traffic ${{ vars.SERVICE_NAME }} --to-latest --region=us-west1 --quiet

      - name: Remove canary tag
        run: gcloud run services update-traffic ${{ vars.SERVICE_NAME }} --remove-tags=canary --region=us-west1 --quiet