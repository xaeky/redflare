name: Deploy main branch to Cloud Run as staging
on:
  push:
    branches:
      - 'main'
    paths-ignore: # do not build for irrelvant changes like markdown files
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      meta: ${{ steps.meta.outputs.json }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auth Cloud SDK
      id: 'auth'
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        token_format: 'access_token'

    - name: Login to pkg.dev
      uses: docker/login-action@v3
      with:
        registry: us-west1-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: us-west1-docker.pkg.dev/redflare-prod/avatars-console/redflare

    - name: Build and push
      id: build-push
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            SOURCE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.source'] }}
  
  migrate:
    uses: ./.github/workflows/migrate-db.yml
    needs: build
    permissions:
      contents: read
      id-token: write
    with:
      env: staging
    secrets: inherit
  
  deploy-staging-canary:
    uses: ./.github/workflows/cloudrun-deploy.yml
    needs: build
    permissions:
      contents: read
      id-token: write
    with:
      image: us-west1-docker.pkg.dev/redflare-prod/avatars-console/redflare@${{ needs.build.outputs.digest }}
      env: staging
      strategy: canary
    secrets: inherit

  test-e2e:
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: 'read'
      id-token: 'write'
    needs:
      - build
      - deploy-staging-canary
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Auth Cloud SDK
        if: always()
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'cloud-run-proxy'

      - name: Start canary proxy
        run: |
          gcloud run services proxy ${{ vars.SERVICE_NAME }}-canary \
            --region=us-west1 --port=8080 &
          echo $! > /tmp/gcloud-proxy.pid
          for i in {1..10}; do
            nc -z localhost 8080 && break || sleep 1
          done
          bunx local-ssl-proxy --source 3000 --target 8080 &
          echo $! > /tmp/ssl-proxy.pid
          for i in {1..10}; do
            nc -z localhost 3000 && break || sleep 1
          done

      - name: Run E2E tests
        timeout-minutes: 5
        env:
          CI: true
          FORCE_REMOTE: true
          TEST_URL: https://localhost:3000
        run: bun test:e2e

      - name: Stop canary proxy
        if: always()
        run: |
          kill $(cat /tmp/ssl-proxy.pid) || true
          kill $(cat /tmp/gcloud-proxy.pid) || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Delete canary service
        if: always()
        run: gcloud run services delete ${{ vars.SERVICE_NAME }}-canary --region=us-west1 --quiet || true

  rollback-migrations:
    runs-on: ubuntu-latest
    environment: staging
    needs: [migrate, test-e2e]
    if: failure() && needs.test-e2e.result == 'failure'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: bun run scripts/rollback.ts ${{ needs.migrate.outputs.applied_count }}
  
  deploy-staging:
    uses: ./.github/workflows/cloudrun-deploy.yml
    needs: [build, test-e2e]
    permissions:
      contents: read
      id-token: write
    with:
      image: us-west1-docker.pkg.dev/redflare-prod/avatars-console/redflare@${{ needs.build.outputs.digest }}
      env: staging
      strategy: direct
    secrets: inherit

  promote-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://avatars-console-staging.xaeky.cloud
    permissions:
      contents: read
      id-token: write
    needs: deploy-staging
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Send all traffic to this new version
        id: promote
        run: gcloud run services update-traffic ${{ vars.SERVICE_NAME }} --to-latest --region=us-west1 --quiet