name: Discord Notify
description: Send a message to a Discord webhook
inputs:
  webhook_url:
    required: true
  message:
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        curl -s -H "Content-Type: application/json" \
          -d "{\"content\": \"${{ inputs.message }}\"}" \
          "${{ inputs.webhook_url }}"